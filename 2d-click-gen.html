<html lang="en">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>[CLICK GEN] CANVAS THINGS</title>
      <link rel="stylesheet" href="./global.css" />
   </head>
   <body>
      <div class="container">
         <canvas id="canvas">
            If you're seeing this, your browser doesn't support the canvas tag.
            That's wild. Are you on a Dell from 2003 using AOL?
         </canvas>
         <div>
            <button id="restart" class="button">Restart</button>
            <select id="experiment-chooser" disabled>
               <option>Basic</option>
               <option>EX2</option>
               <option>EX3</option>
            </select>
         </div>
      </div>
      <div class="watermark">
         Canvas Things
         <div id="title">Loading</div>
      </div>
   </body>
</html>
<script src="./constants.js"></script>
<script src="./global.js"></script>
<script>
   const canvas = document.getElementById('canvas')
   const context = canvas.getContext('2d')
   canvas.width = CONSTANTS.canvasWidth
   canvas.height = CONSTANTS.canvasHeight

   let state = {}

   canvas.addEventListener('click', (evt) => {
      log('[fx-click]', {
         evt,
         x: evt.offsetX,
         y: evt.offsetY,
      })

      draw({ x: evt.offsetX, y: evt.offsetY })
   })

   function draw({ x, y }) {
      context.fillStyle = randRgb({ alpha: true })
      context.fillRect(x - 50, y - 50, 100, 100)
   }

   function restart() {
      if (!CONSTANTS.debug) console.clear()
      log('[fx-restart]')
      context.clearRect(0, 0, CONSTANTS.canvasWidth, CONSTANTS.canvasHeight)
      state = {}
   }
   document.getElementById('restart').addEventListener('click', () => restart())
</script>
