<html>
   <head>
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>[GEN RECTS] CANVAS THINGS</title>
      <link rel="stylesheet" href="./global.css" />
   </head>
   <body>
      <div class="container">
         <canvas id="canvas">
            If you're seeing this, your browser doesn't support the canvas tag.
            That's wild. Are you on a Dell from 2003 using AOL?
         </canvas>
         <div>
            <button id="redraw">Draw Again</button>
            <select id="experiment-chooser" disabled>
               <option>Basic</option>
               <option>EX2</option>
               <option>EX3</option>
            </select>
         </div>
      </div>
      <div class="watermark">
         Canvas Things
         <div id="title">Loading</div>
      </div>
   </body>
</html>
<script src="./constants.js"></script>
<script src="./global.js"></script>
<script>
   function genRects({ name = null, total, maxSize }) {
      const TOTAL = rand(total)
      const rectangles = []

      // Build props, don't push to context until draw
      for (let i = 0; i < TOTAL; i++) {
         rectangles.push({
            x: rand(800),
            y: rand(600),
            width: rand(maxSize),
            height: rand(maxSize),
            fillStyle: randRgb({ alpha: true }),
         })
      }

      console.info(`[fx-genRects] ${name ?? ''}`, rectangles)
      return rectangles
   }

   function draw() {
      const canvas = document.getElementById('canvas')
      const context = canvas.getContext('2d')

      canvas.width = CONSTANTS.canvasWidth
      canvas.height = CONSTANTS.canvasHeight

      // Mini bois
      const miniRects = genRects({ name: 'miniRects', total: 6, maxSize: 165 })

      for (const rect of miniRects) {
         context.fillStyle = rect.fillStyle
         context.fillRect(rect.x, rect.y, rect.width, rect.height)
      }

      // Big boi
      context.fillStyle = randRgb()
      context.fillRect(
         rand(CONSTANTS.canvasWidth),
         rand(CONSTANTS.canvasHeight),
         250,
         250,
      ) // x, y, width, height
   }

   function redraw(experiment = null, preserveLogs = false) {
      if (!preserveLogs) console.clear()
      if (experiment) console.info(`Experiment loaded: ${experiment}`)
      draw()
   }

   draw()
   document.getElementById('redraw').addEventListener('click', () => redraw())
</script>
