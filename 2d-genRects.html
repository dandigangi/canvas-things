<html>
   <head>
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>[GEN RECTS] CANVAS THINGS</title>
      <style>
         body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #eee;
            display: flex;
            justify-content: center;
            align-items: center;
         }

         .container {
            width: 800px;
            height: 600px;
            border: 1px solid #a5a5a5;
            position: relative;
            z-index: 1;
         }

         .watermark {
            position: absolute;
            bottom: 0;
            left: 0;
            opacity: 0.5;
            z-index: 0;
            font-size: 120px;
            line-height: 120px;
            font-weight: bold;
            color: #b9b9b9;
            text-align: center;
            text-transform: uppercase;
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            transform: translate(-1px, 12px);
            letter-spacing: -6px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
         }

         #title {
            margin-left: 10px;
            font-size: 30px;
            line-height: 30px;
            color: #5a5a5a;
            position: relative;
            letter-spacing: -2px;
            top: -19px;
         }

         #redraw {
            margin-top: 12px;
            padding: 10px 18px;
            font-size: 16px;
            font-weight: 500;
            color: #fff;
            background: #5c15b5;
            border: 1px solid #652f8b;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
         }

         #redraw:hover {
            background: #490d93;
         }

         canvas {
            display: block;
            width: 100%;
            height: 100%;
            background-color: #fff;
         }
      </style>
   </head>
   <body>
      <div class="container">
         <canvas id="canvas">
            If you're seeing this, your browser doesn't support the canvas tag.
            That's wild. Are you on a Dell from 2003 using AOL?
         </canvas>
         <button id="redraw">Draw</button>
      </div>
      <div class="watermark">
         Canvas Things
         <div id="title">Loading</div>
      </div>
   </body>
</html>
<script>
   const CONSTANTS = {
      canvasWidth: 800,
      canvasHeight: 600,
   }

   // Set watermark to experiment title
   ;(function () {
      const el = document.getElementById('title')
      el.textContent = el.textContent.replace(
         'Loading',
         document.title.replace(/ canvas things/i, ''),
      )
   })()

   // Supporting functions
   function redraw() {
      console.clear()
      draw()
   }

   function rand(max = null) {
      if (!max) throw new Error('[fx-rand] No max value provided')
      return Math.floor(Math.random() * max + 3)
   }

   function randRgb() {
      return `rgb(${rand(255)}, ${rand(255)}, ${rand(255)})`
   }

   // Canvas Things
   function genRects({ name = null, total, maxSize }) {
      const TOTAL = rand(total)
      const rectangles = []

      // Build props, don't push to context until draw
      for (i = 0; i < TOTAL; i++) {
         rectangles.push({
            x: rand(800),
            y: rand(600),
            width: rand(maxSize),
            height: rand(maxSize),
            fillStyle: randRgb(),
         })
      }

      console.info('[fx-genRects]', name ? name : '', rectangles)
      return rectangles
   }

   function draw() {
      const canvas = document.getElementById('canvas')
      const context = canvas.getContext('2d')

      canvas.width = CONSTANTS.canvasWidth
      canvas.height = CONSTANTS.canvasHeight

      // Mini bois
      const miniRects = genRects({ name: 'miniRects', total: 6, maxSize: 123 })

      for (const rect of miniRects) {
         context.fillStyle = rect.fillStyle
         context.fillRect(rect.x, rect.y, rect.width, rect.height)
      }

      // Big boi
      context.fillStyle = randRgb()
      context.fillRect(
         rand(CONSTANTS.canvasWidth),
         rand(CONSTANTS.canvasHeight),
         200,
         200,
      ) // x, y, width, height
   }

   draw()
   document.getElementById('redraw').addEventListener('click', redraw)
</script>
