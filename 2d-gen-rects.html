<html>
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>[GEN RECTS] CANVAS THINGS</title>
      <link rel="stylesheet" href="./global.css" />
   </head>
   <body>
      <div class="container">
         <canvas id="canvas">
            If you're seeing this, your browser doesn't support the canvas tag.
            That's wild. Are you on a Dell from 2003 using AOL?
         </canvas>
         <div>
            <button id="redraw" class="button">Draw Again</button>
            <button id="clear" class="button">Clear</button>
            <select id="experiment-chooser" disabled>
               <option>Basic</option>
               <option>EX2</option>
               <option>EX3</option>
            </select>
         </div>
      </div>
      <div class="watermark">
         Canvas Things
         <div id="title">Loading</div>
      </div>
   </body>
</html>
<script src="./constants.js"></script>
<script src="./global.js"></script>
<script>
   const canvas = document.getElementById('canvas')
   const context = canvas.getContext('2d')
   canvas.width = CONSTANTS.canvasWidth
   canvas.height = CONSTANTS.canvasHeight

   function genRects({ name = null, total, maxSize }) {
      log('[fx-genRects]')
      const rectangles = []

      // build props, draw later
      for (let i = 0; i < total; i++) {
         let x = rand({ max: CONSTANTS.canvasWidth })
         let y = rand({ max: CONSTANTS.canvasHeight })
         const width = rand({ max: maxSize })
         const height = rand({ max: maxSize })

         // edge detection
         if (x + width > CONSTANTS.canvasWidth) {
            log(
               `[rect ${i}] x edge collision by`,
               x + width - CONSTANTS.canvasWidth,
            )

            x = CONSTANTS.canvasWidth - width
         }

         if (y + height > CONSTANTS.canvasHeight) {
            log(
               `[rect ${i}] y edge collision by`,
               y + height - CONSTANTS.canvasHeight,
            )

            y = CONSTANTS.canvasHeight - height
         }

         rectangles.push({
            x,
            y,
            width,
            height,
            fillStyle: randRgb({ alpha: true }),
         })
      }

      log(`[fx-genRects] ${name ?? ''}`, rectangles)
      return rectangles
   }

   function draw() {
      context.clearRect(0, 0, CONSTANTS.canvasWidth, CONSTANTS.canvasHeight)

      // big boi (no edge detection; anchor w/ dark color)
      // z-index to canvas is procedural (aka top down order)
      context.fillStyle = '#333'
      context.fillRect(
         rand({ max: CONSTANTS.canvasWidth }),
         rand({ max: CONSTANTS.canvasHeight }),
         250,
         250,
      ) // x, y, width, height

      // mini bois
      const miniRects = genRects({ name: 'miniRects', total: 10, maxSize: 350 })

      for (const rect of miniRects) {
         context.fillStyle = rect.fillStyle
         context.fillRect(rect.x, rect.y, rect.width, rect.height)
      }
   }

   draw()

   function redraw() {
      console.clear()
      draw()
   }
   document.getElementById('redraw').addEventListener('click', () => redraw())

   function clear() {
      context.clearRect(0, 0, CONSTANTS.canvasWidth, CONSTANTS.canvasHeight)
   }
   document.getElementById('clear').addEventListener('click', () => clear())
</script>
