<html lang="en">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>basic animations CANVAS THINGS</title>
      <link rel="stylesheet" href="./global.css" />
   </head>
   <body>
      <div class="container">
         <canvas id="canvas">
            If you're seeing this, your browser doesn't support the canvas tag.
            That's wild. Are you on a Dell from 2003 using AOL?
         </canvas>
         <div>
            <button id="redraw">Draw Again</button>
            <select id="experiment-chooser" disabled>
               <option>Basic</option>
               <option>EX2</option>
               <option>EX3</option>
            </select>
         </div>
      </div>
      <div class="watermark">
         Canvas Things
         <div id="title">Loading</div>
      </div>
   </body>
</html>
<script src="./constants.js"></script>
<script src="./global.js"></script>
<script>
   const canvas = document.getElementById('canvas')
   const context = canvas.getContext('2d')
   canvas.width = CONSTANTS.canvasWidth
   canvas.height = CONSTANTS.canvasHeight

   function draw() {
      context.font = '24px sans-serif'
      context.fillStyle = '#333'
      context.textAlign = 'center'
      context.textBaseline = 'middle'
      context.fillText(
         'you canvasmaxxing yet bro?',
         CONSTANTS.canvasWidth / 2,
         CONSTANTS.canvasHeight / 2,
      )
   }

   draw()

   function redraw() {
      console.clear()
      draw()
   }
   document.getElementById('redraw').addEventListener('click', () => redraw())
</script>
