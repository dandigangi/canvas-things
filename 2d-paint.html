<html lang="en">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>[PAINT] CANVAS THINGS</title>
      <link rel="stylesheet" href="./global.css" />
   </head>
   <body>
      <div class="container">
         <div id="color-picker">
            <div class="red" data-color="#f00"></div>
            <div class="green" data-color="#0f0"></div>
            <div class="blue" data-color="#00f"></div>
            <div class="yellow" data-color="#ff0"></div>
         </div>
         <canvas id="canvas">
            If you're seeing this, your browser doesn't support the canvas tag.
            That's wild. Are you on a Dell from 2003 using AOL?
         </canvas>
         <div>
            <button id="restart" class="button">Restart</button>
            <select id="experiment-chooser" disabled>
               <option>Basic</option>
               <option>EX2</option>
               <option>EX3</option>
            </select>
         </div>
      </div>
      <div class="watermark">
         Canvas Things
         <div id="title">Loading</div>
      </div>
   </body>
</html>
<script src="./constants.js"></script>
<script src="./global.js"></script>
<script>
   const canvas = document.getElementById('canvas')
   const context = canvas.getContext('2d')
   canvas.width = CONSTANTS.canvasWidth
   canvas.height = CONSTANTS.canvasHeight

   let state = {
      paintColor: null,
   }

   canvas.addEventListener('mousemove', (evt) => {
      draw(evt.offsetX, evt.offsetY)
   })

   document.querySelectorAll('#color-picker div').forEach((div) => {
      div.addEventListener('click', (evt) => {
         state.paintColor = evt.target.dataset.color
      })
   })

   function draw(x, y) {
      console.log(state.paintColor)
      context.fillStyle = state.paintColor || '#333'
      context.fillRect(x, y, 20, 20)
   }

   function restart() {
      console.clear()
      console.log('[fx-restart]')
      state = {}
   }
   document.getElementById('restart').addEventListener('click', () => restart())
</script>
