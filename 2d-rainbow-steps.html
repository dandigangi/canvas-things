<html lang="en">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>[BASIC ANIMATIONS] CANVAS THINGS</title>
      <link rel="stylesheet" href="./global.css" />
   </head>
   <body>
      <div class="container">
         <canvas id="canvas">
            If you're seeing this, your browser doesn't support the canvas tag.
            That's wild. Are you on a Dell from 2003 using AOL?
         </canvas>
         <div>
            <button id="redraw" class="button">Draw Again</button>
            <button id="clear" class="button">Clear</button>
            <select id="experiment-chooser" disabled>
               <option>Basic</option>
               <option>EX2</option>
               <option>EX3</option>
            </select>
         </div>
      </div>
      <div class="watermark">
         Canvas Things
         <div id="title">Loading</div>
      </div>
   </body>
</html>
<script src="./constants.js"></script>
<script src="./global.js"></script>
<script>
   const canvas = document.getElementById('canvas')
   const context = canvas.getContext('2d')
   canvas.width = CONSTANTS.canvasWidth
   canvas.height = CONSTANTS.canvasHeight

   function draw() {
      //
      const steps = rand(20)
      const stepWidth = CONSTANTS.canvasWidth / steps
      const stepHeight = CONSTANTS.canvasHeight / steps
      const stepColor = 360 / steps

      for (let i = 0; i < steps; i++) {
         context.fillStyle = `hsl(${i * stepColor} 100% 50%)`

         if (rand(10) < 5) {
            context.fillRect(
               i * stepWidth,
               0,
               stepWidth,
               CONSTANTS.canvasHeight,
            )
         } else {
            context.fillRect(
               0,
               i * stepHeight,
               CONSTANTS.canvasWidth,
               stepHeight,
            )
         }
      }
   }

   draw()

   function redraw() {
      console.clear()
      draw()
   }
   document.getElementById('redraw').addEventListener('click', () => redraw())

   function clear() {
      context.clearRect(0, 0, CONSTANTS.canvasWidth, CONSTANTS.canvasHeight)
   }
   document.getElementById('clear').addEventListener('click', () => clear())
</script>
