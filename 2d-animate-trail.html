<html lang="en">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>[ANIMATE TRAIL] CANVAS THINGS</title>
      <link rel="stylesheet" href="./global.css" />
   </head>
   <body>
      <div class="container">
         <canvas id="canvas">
            If you're seeing this, your browser doesn't support the canvas tag.
            That's wild. Are you on a Dell from 2003 using AOL?
         </canvas>
      </div>
      <div class="watermark">
         Canvas Things
         <div id="title">Loading</div>
      </div>
   </body>
</html>
<script src="./constants.js"></script>
<script src="./global.js"></script>
<script>
   const canvas = document.getElementById('canvas')
   const context = canvas.getContext('2d')
   canvas.width = CONSTANTS.canvasWidth
   canvas.height = CONSTANTS.canvasHeight

   let state = {
      color: '120 75 25',
      opacity: 100,
   }

   canvas.addEventListener('click', (evt) => {
      state.x = evt.offsetX
      state.y = evt.offsetY
      loop()
   })

   function draw() {
      context.fillStyle = `hsl(${state.color} / ${state.opacity}%)`
      context.fillRect(state.x, state.y, 60, 60)
   }

   function loop() {
      context.clearRect(0, 0, CONSTANTS.canvasWidth, CONSTANTS.canvasHeight)

      if (state.opacity > 0) {
         state.opacity = state.opacity - 1.75
      }

      if (state.y < CONSTANTS.canvasHeight) {
         state.y = state.y + 1
         draw()
      }
      requestAnimationFrame(loop)
   }
</script>
